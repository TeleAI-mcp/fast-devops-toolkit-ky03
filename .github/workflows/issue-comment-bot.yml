name: Issue Comment Bot

on:
  issues:
    types: [labeled]

jobs:
  comment:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Check label and comment
        env:
          LABEL: ${{ github.event.label.name }}
        run: |
          if [ "$LABEL" = "feature" ]; then
            COMMENT="Thank you for the feature request. We will consider including this in a future release."
          elif [ "$LABEL" = "enhancement" ]; then
            COMMENT="Thanks for the enhancement suggestion! We appreciate your input."
          elif [ "$LABEL" = "wontfix" ]; then
            COMMENT="After review, we have decided not to address this issue at this time."
          else
            echo "No matching label, skipping"
            exit 0
          fi
          echo "BODY=$COMMENT" >> $GITHUB_ENV
      - name: Add comment to issue
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: process.env.BODY
            })